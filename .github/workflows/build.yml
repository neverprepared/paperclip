name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o paperclip .

      - name: Import Code Signing Certificate
        if: github.event_name != 'pull_request'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

          rm certificate.p12

      - name: Code Sign
        if: github.event_name != 'pull_request'
        env:
          MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$MACOS_IDENTITY" \
            --timestamp paperclip
          codesign --verify --verbose paperclip

      - name: Notarize
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          zip paperclip.zip paperclip

          xcrun notarytool submit paperclip.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          rm paperclip.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperclip-darwin-${{ matrix.goarch }}
          path: paperclip

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, 386]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build daemon (with console)
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o paperclip.exe .

      - name: Build tray (no console window)
        if: matrix.goarch == 'amd64'
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -H windowsgui" -o paperclip-tray.exe .

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperclip-windows-${{ matrix.goarch }}
          path: paperclip.exe

      - name: Upload tray artifact
        if: matrix.goarch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: paperclip-windows-tray-amd64
          path: paperclip-tray.exe

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/paperclip-darwin-arm64/paperclip  paperclip-darwin-arm64
          mv artifacts/paperclip-windows-amd64/paperclip.exe  paperclip-windows-amd64.exe
          mv artifacts/paperclip-windows-tray-amd64/paperclip-tray.exe  paperclip-windows-tray-amd64.exe
          mv artifacts/paperclip-windows-386/paperclip.exe  paperclip-windows-386.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            paperclip-darwin-arm64
            paperclip-windows-amd64.exe
            paperclip-windows-tray-amd64.exe
            paperclip-windows-386.exe
          generate_release_notes: true
